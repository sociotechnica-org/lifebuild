name: Playground Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/prototype-playground/**'
      - 'packages/hex-grid-prototype/**'

concurrency:
  group: playground-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build playground
        run: pnpm --filter @lifebuild/prototype-playground build

      - name: Deploy preview
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_PREVIEW_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          BRANCH="pr-${PR_NUMBER}"

          DEPLOY_OUTPUT=$(pnpm --filter @lifebuild/prototype-playground exec wrangler pages deploy dist \
            --project-name lifebuild-playground \
            --branch "${BRANCH}" \
            --commit-hash "${GITHUB_SHA}" \
            --commit-message "PR #${PR_NUMBER} playground preview" 2>&1)

          echo "${DEPLOY_OUTPUT}"

          PREVIEW_URL=$(echo "${DEPLOY_OUTPUT}" | grep -Eo 'https://[a-zA-Z0-9._-]+\.pages\.dev' | head -n1 || true)
          if [[ -z "${PREVIEW_URL}" ]]; then
            PREVIEW_URL="https://${BRANCH}.lifebuild-playground.pages.dev"
          fi

          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- playground-preview -->';
            const body = [
              marker,
              `## Playground Preview`,
              '',
              `🎮 ${process.env.PREVIEW_URL}`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
